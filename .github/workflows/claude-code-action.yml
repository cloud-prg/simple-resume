name: Claude Code Action

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # 防止机器人评论触发无限循环
    if: github.event_name != 'issue_comment' || !contains(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            ${{ github.event_name == 'pull_request' && 'Please review this pull request. Check for bugs, security issues, performance problems, and suggest improvements. Be concise but thorough.' || '' }}
            ${{ github.event_name == 'issues' && 'Please analyze this issue and suggest a fix or implementation plan. If it looks like a simple bug, outline the code changes needed.' || '' }}
            ${{ (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') && 'Please respond to the user comment and help with their request regarding this PR/issue.' || '' }}
